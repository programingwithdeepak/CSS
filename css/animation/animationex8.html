<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      .loader {
    width: 50px;
    aspect-ratio: 1;
    color: #f03355;
    --_c:no-repeat radial-gradient(farthest-side,currentColor 92%,#0000);
    background:
    var(--_c) 50% 0 /12px 12px,
    var(--_c) 50% 100%/12px 12px,
    var(--_c) 100% 50%/12px 12px,
    var(--_c) 0 50%/12px 12px,
    var(--_c) 50% 50%/12px 12px,
    conic-gradient(from 90deg at 4px 4px,#0000 90deg,currentColor 0)
    -4px -4px/calc(50% + 2px) calc(50% + 2px);
    animation: l8 1s infinite linear;
    }
    @keyframes l8 {to{transform: rotate(.5turn)}}

    /* 1 */
   
    /* 3 */
    .loader-2 {
    width: 120px;
    height: 20px;
    border-radius: 20px;
    background:
    repeating-linear-gradient(135deg,#f03355 0 10px,#ffa516 0 20px) 0/0% no-repeat,
    repeating-linear-gradient(135deg,#ddd 0 10px,#eee 0 20px) 0/100%;
    animation: l3 2s infinite;
    }
    @keyframes l3 {
    100% {background-size:100%}
    }
    /*  */
    .loader-4 {
    width: 60px;
    aspect-ratio: 1;
    display: grid;
    grid: 50%/50%;
    color: #25b09b;
    --_g: no-repeat linear-gradient(currentColor 0 0);
    background: var(--_g),var(--_g),var(--_g);
    background-size: 50.1% 50.1%;
    animation:
    l6-0 1.5s infinite steps(1) alternate,
    l6-0-0 3s infinite steps(1);
    }
    .loader::before {
    content: "";
    background: currentColor;
    transform: perspective(150px) rotateY(0deg) rotateX(0deg);
    transform-origin: bottom right;
    animation: l6-1 1.5s infinite linear alternate;
    }
    @keyframes l6-0 {
    0% {background-position: 0 100%,100% 100%,100% 0}
    33% {background-position: 100% 100%,100% 100%,100% 0}
    66% {background-position: 100% 0 ,100% 0 ,100% 0}
    }
    @keyframes l6-0-0 {
    0% {transform: scaleX(1) rotate(0deg)}
    50% {transform: scaleX(-1) rotate(-90deg)}
    }
    @keyframes l6-1 {
    16.5%{transform:perspective(150px) rotateX(-90deg) rotateY(0deg) rotateX(0deg);filter:grayscale(0.8)}
    33% {transform:perspective(150px) rotateX(-180deg) rotateY(0deg) rotateX(0deg)}
    66% {transform:perspective(150px) rotateX(-180deg) rotateY(-180deg) rotateX(0deg)}
    100% {transform:perspective(150px) rotateX(-180deg) rotateY(-180deg) rotateX(-180deg);filter:grayscale(0.8)}
    }
    


    </style>
</head>
<body>
     <div class="loader"></div> <br>


     <!-- 2 -->
      <br>
     <!-- 3 -->
    <div class="loader-2"></div> <br>

    <!--  -->
     <div class="loader-4"></div>
    
   
    
</body>
</html>
