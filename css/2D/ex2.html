<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
       
    <style>
        *{
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: white;
            margin: 0;
        }

        .wrapper {
            position: relative;
            width: 250px;
            /* container size */
            height: 250px;
        }

        .square {
            position: absolute;
            width: 250px;
            height: 250px;
            border: 2px solid;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .diamond {
            position: absolute;
            width: 250px;
            height: 250px;
            border: 2px solid;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="square"></div>
        <div class="diamond"></div>
    </div>
</body>

</html>
