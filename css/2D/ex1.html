<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
    <head>
       </title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: white;
            margin: 0;
        }
*{
    box-sizing: border-box;
}
        .box {
            position: relative;
            width: 200px;
            height: 200px;
            border: 2px solid;
        }

        .diamond {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid;
            transform: rotate(45deg);
        }

        /* top */
        .box-1 {
            top: -30px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
        }

        /* right */
        .box-2 {
            right: -30px;
            top: 50%;
            transform: translateY(-50%) rotate(45deg);
        }

        /* bottom */
        .box-3 {
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
        }

        /* left */
        .box-4 {
            left: -30px;
            top: 50%;
            transform: translateY(-50%) rotate(45deg);
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="diamond box-1"></div>
        <div class="diamond box-2"></div>
        <div class="diamond box-3"></div>
        <div class="diamond box-4"></div>
    </div>
</body>

</html>
