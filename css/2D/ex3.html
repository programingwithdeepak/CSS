<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            width: 250px;
            height: 250px;
            background-color: aqua;
            margin: 20vh auto;
            position: relative;
            perspective: 200px;
        }
        .sub{
             width: 250px;
            height: 250px;
            background-color: rgb(255, 0, 0);
            position: absolute;
            transform-style: preserve-3d;
            transform: rotateY(50deg);
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="sub"></div>
    </div>
    
</body>
</html>
