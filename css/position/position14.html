<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
        }

        .main {
            height: 90vh;
            background-color: blanchedalmond;
        }

        .head {
            height: 10vh;
            background-color: black;
            position: sticky;
            top: 0vh;
            margin-bottom: 1vh;
        }
       

        .midleft{
            height: 90vh;
            width: 30%;
            background-color: rgb(64, 228, 228);
            margin-bottom: 1vh;
        
        }

         .midright{
            height: 90vh;
            width: 69%;
            float: right;
            background-color: gray;
            margin-bottom: 1vh;
    
        }
        .h1{
            height: 10vh;
            background-color: aquamarine;
            position: sticky;
            top: 10vh;
        }
        .clr{
            clear: both;
        }

        .footer {
            height: 10vh;
            background-color: black;
        }
    </style>
</head>

<body>
    <div class="main"></div>
    <div class="head"></div>

    
        <div class="midright"></div>
        <div class="midright">
            <div class="h1"></div>
        </div>
        <div class="midright"></div>
        <div class="midright"></div>
        <div class="midright">
            <div class="h1"></div>
        </div>
        <div class="midright"></div>
        <div class="midleft"></div>
        <div class="midleft">
            <div class="h1"></div>
        </div>
        <div class="midleft"></div>
        <div class="midleft"></div>
        <div class="midleft">
            <div class="h1"></div>
        </div>
        <div class="midleft"></div>


    
    <div class="clr"></div>

    <div class="footer"></div>
</body>

</html>
