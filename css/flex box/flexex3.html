<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;
        }

        .bg1 {
            background-color: antiquewhite;
        }

        .bg2 {
            background-color: blue;
        }

        .row {
            display: flex;
            flex-direction: row-reverse;
            /* flex-flow: row wrap; */
        }

        .box {
            width: 20%;
            height: 25vh;
        }
    </style>
</head>

<body>
    <div class="row">
        <div class="box bg1">1</div>
        <div class="box bg2">2</div>
        <div class="box bg1">3</div>
        <div class="box bg2">4</div>
        <div class="box bg1">5</div>
        <div class="box bg2">6</div>
    </div>
</body>

</html>
