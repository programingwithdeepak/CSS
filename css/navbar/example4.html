<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <link rel="stylesheet" href="css/all.min.css">
    <style>
        *{
            margin: 0%;
            padding: 0%;
            /* box-sizing: border-box; */
        }
        .clr{
            clear: both;
        }
        .nav-block{
            background-color: #0D0D0D;
            width: 15%;
            /* padding:1% 5%; */
        }
        .nav-block ul{
          padding:10%; 
        }
        .nav-block ul li{
            list-style: none;
            padding: 9% 10%;
            background-color: #00FFFF;
            border-radius: 0px 15px 15px 0px;
            border-left:5px solid #7B1FA2 ;
            margin-top: 10%;
        }
        .nav-block ul li a{
            text-decoration: none;
            color: #FF00FF;
        }



        .nav-block1{
            background-color: #FF6F61;
            width: 15%;
            /* padding:1% 5%; */
            margin-left: 20%;
            position: absolute;
            top: 0px;
        }
        .nav-block1 ul{
          padding:10%; 
        }
        .nav-block1 ul li{
            list-style: none;
            padding: 9% 10%;
            background-color: #212121;
            border-radius: 0px 15px 15px 0px;
            border-left:5px solid #FFFFFF ;
            margin-top: 10%;
        }
        .nav-block1 ul li a{
            text-decoration: none;
            color: #FFFFFF;
        }
        i{
            color: #7B1FA2;
            padding-right: 10px;
        }
    </style>
</head>
<body>
    <div class="nav-block">
        <ul>

            <li><i class="fa-solid fa-house"></i><a href="#">Home</a></li>
            <li><i class="fa-solid fa-house"></i><a href="#">Home</a></li>
            <li><i class="fa-solid fa-house"></i><a href="#">Home</a></li>
            <li><i class="fa-solid fa-house"></i><a href="#">Home</a></li>
            <div class="clr"></div>
        </ul>
    </div>


    <div class="nav-block1">
