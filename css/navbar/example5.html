<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/all.min.css">
    <style>
        * {
            margin: 0%;
            padding: 0%;
        }

        .clr {
            clear: both;
        }

        .nav {
            background-color: blue;
            padding: 1% 5%;
        }

        .nav li {
            float: right;
            list-style: none;
            background-color: aqua;
            padding: .5% 3%;
            border-radius: 10px;
            margin-left: 5%;
        }

        .nav li a {
            text-decoration: none;
            color: red;
        }
        .nav li i{
            padding-right: 10px;
        }

        .logo {
            float: left;
            background-color: aqua;
            padding: 0.01% 1%;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="nav">
        <div class="logo">
            <h2>✨</h2>
        </div>
        <ul>
            <li><a href="#"><i class="fa-solid fa-user"></i>Profile</a></li>
            <li><a href="#"><i class="fa-solid fa-phone"></i>Contact</a></li>
            <li><a href="#"><i class="fa-solid fa-info-circle"></i>About</a></li>
            <li><a href="#"><i class="fa-solid fa-house"></i>Home</a></li>
            <div class="clr"></div>
        </ul>

    </div>

</body>

</html>
