<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        .box {
            width: 200px;
            height: 200px;
            background-color: whitesmoke;
            float: left;
            margin: 1%;
        }

        .b1 {
            border: 5px;
            border-style: solid;
            border-color: royalblue;

        }

        .b2 {
            border: 2px dashed tomato;
        }

        .b3 {
            border: royalblue inset 50px;
        }

        .b4 {
            border: royalblue outset 50px;
        }

        /* example direction (top,right,bottom,left) */

        .b5 {
            border-left: 30px solid red;
        }

        .b6 {
            border-left: 30px solid red;
            border-right: 30px solid red;
        }

        .b7 {
            border-top:25px solid transparent;
            border-right:25px solid transparent;
            border-bottom:25px solid blue;
            border-left: 25px solid transparent;
        }

        .b8 {
            border-top: 100px solid white;
            border-right: 100px solid red;
            border-bottom: 100px solid red;
            border-left: 100px solid red;
        }

        .b9 {
            border-top: 100px solid transparent;
            border-right: 100px solid red;
            border-bottom: 100px solid transparent;
            border-left: 100px solid red;
        }

        .b10 {
            border-top: tomato 65px solid;
            border-bottom: green 65px solid;
        }
        .b11 {
            border-top: 65px solid tomato;
            border-bottom: 65px solid black;
        }
        .b12 {
            border-left: 65px solid tomato;
            border-right: 65px solid black;

        
        }
        .b13 {
            border-top: 100px solid blue;
            border-bottom: 100px solid gold;
            
        }
        .b14 {
            border-left: 100px solid white;
            border-top: 100px solid red;
            border-bottom: 100px solid blue;
            
        }
        .b15 {
            
            border-right: 150px solid red;
            border-left: 50px solid whitesmoke;
        }
        .b16 {
            background-color: yellow;
            border-bottom:50px solid green ;
            border-top:100px solid gray ;
            
        }
        .b17 {
            background-color: red;
            border-bottom:150px solid green ;
            border-right:100px solid green ;
            
        }
        .b18 {
        
            border-top:200px solid green ;
            border-left:200px solid blue ;
            
        }
        .b19 {
            background-color: red;
            border-bottom:50px solid green ;
            border-right:50px solid green ;
            border-left:50px solid green ;
            
        }
        .b20 {
            border-left: 100px solid black;
            border-top: 100px solid   red;
            border-bottom: 100px solid  red;
            
        }
        .b21 {
            border-right: 150px solid black;
            border-top: 100px solid   red;
            border-bottom: 100px solid  red;
            
        }
       
    </style>
</head>

<body>
    <div class="box b1"></div>
    <div class="box b2"></div>
    <div class="box b3"></div>
    <div class="box b4"></div>

    <div class="box b5"></div>
    <div class="box b6"></div>
    <div class="box b7"></div>
    <div class="box b8"></div>
    <div class="box b9"></div>


    <div class="box b10"></div>
    <div class="box b11"></div>
    <div class="box b12"></div> 
    <div class="box b13"></div>
    <div class="box b14"></div>
    <div class="box b15"></div>

    <div class="box b16"></div>
    <div class="box b17"></div>
    <div class="box b18"> </div>
    <div class="box b19"></div>
    <div class="box b20"></div>
    <div class="box b21"></div>

</body>

</html>
