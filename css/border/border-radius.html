<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        .box {
            width: 200px;
            height: 200px;
            background-color: whitesmoke;
            margin: 1%;
            float: left;
        }

        .b1 {
            border: 10px solid gold;
            /* sequre : % , reactangular : px */
            border-radius: 50%;
        }

        .b2 {
            border-radius: 50%;
        }

        .b3 {
            border-top: 100px solid gold;
            border-right: 100px solid teal;
            border-bottom: 100px solid tomato;
            border-left: 100px solid royalblue;
            border-radius: 50%;
        }

        .b4 {
            border: 10px solid gold;

            /* top : left ,right , bottom : right , left */

            border-radius: 50% 0%;
        }

        .b5 {
            border: 10px solid gold;

            /* top : left ,right , bottom : right , left */

            border-radius: 0% 0% 50% 50%;
        }

        .b6 {
            border: 10px solid gold;

            /* top : left ,right , bottom : right , left */

            border-radius: 0% 50% 50% 50%;
        }

        .b7 {
            border: 10px solid gold;

            /* top : left ,right , bottom : right , left */

            border-radius: 10% 20% 30% 40%;
        }

        .b8 {
            border: 10px solid gold;

            /* top : left ,right , bottom : right , left */

            border-radius: 10% 20% 30% 40%;
        }

        .tab {
            width: 800px;
            height: 300px;
            background-color: tomato;
            float: left;
            margin-left: 20%;
            margin-top: 10vh;

            border-radius: 50px;
        }
    </style>
</head>

<body>
    <div class="box b1"></div>
    <div class="box b2"></div>
    <div class="box b3"></div>
    <div class="box b4"></div>
    <div class="box b5"></div>
    <div class="box b6"></div>
    <div class="box b7"></div>
    <div class="box b8"></div>

    <div class="tab"></div>


</body>

</html>
