<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            row-gap: 10px;
        }

        .head {
            height: 40px;
            width: 100%;
            background-color: black;
        }

        .main {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .left {
            background-color: aqua;
            width: 29%;
            height: 450px;
        }

        .left .box {
            border-bottom: 1px solid;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .left .box a {
            text-decoration: none;
            font-size: 20px;
        }

        .center {
            background-color: aquamarine;
            width: 40%;
            height: 450px;
        }

        .right {
            background-color: brown;
            width: 29%;
            height: 450px;
        }

        .footer {
            background-color: black;
            width: 100%;
            height: 80px;
        }

        /* Tablet / Medium Screens */
        @media (max-width: 1080px) {
            .main{
                flex-flow: wrap row;
            }
            .left {
            background-color: aqua;
            width: 29%;
            height: 450px;
        }
         .center {
            background-color: aquamarine;
            width: 70%;
            height: 450px;
        }
        .right {
            background-color: brown;
            width: 100%;
            height: 450px;
        }

        .footer {
            background-color: black;
            width: 100%;
            height: 80px;
        }
        }

        /* Phone / Small Screens */
        @media (max-width: 560px) {
            .main {
                flex-direction: column;
            }

            .left {
                width: 100%;
                height: auto;
                background-color: aqua;
            }

            .center {
                width: 100%;
                height: 470px;
                background-color: aquamarine;
            }

            .right {
                width: 100%;
                height: 470px;
                background-color: brown;
            }

            .footer {
                width: 100%;
                height: 40px;
                background-color: black;
            }
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="head"></div>
        <div class="main">
            <div class="left">
                <div class="box"><a href="#">link</a></div>
                <div class="box"><a href="#">link</a></div>
                <div class="box"><a href="#">link</a></div>
                <div class="box"><a href="#">link</a></div>
                <div class="box"><a href="#">link</a></div>
                <div class="box"><a href="#">link</a></div>
                <div class="box"><a href="#">link</a></div>
            </div>
            <div class="center"></div>
            <div class="right"></div>
        </div>
        <div class="footer"></div>
    </div>
</body>

</html>
