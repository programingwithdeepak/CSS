<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0%;
            padding: 0%;
        }
        .head{
            background-color: black;
            height: 40px;
            padding: 1% 5%;
        }
        .head h1{
            color: white;
        }
        @media(max-width:1366px){
            .head{
                background-color: aqua;
            }
            .head h1{
                text-align: right;
                color: black;
            }
        }
        @media(max-width:1080px){
            .head{
                background-color: goldenrod;
            }
            .head h1{
                text-align: right;
                color: red;
            }
        }
        @media(max-width:650px){
            .head{
                background-color: red;
            }
            .head h1{
                text-align: center;
                color: white;
            }
        }
    </style>
</head>
<body>
    <div class="head">
        <h1>MY website</h1>
    </div>
</body>
</html>
