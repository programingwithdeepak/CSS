<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Boxes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
       .wrapper{
        display: flex;
        flex-flow: row wrap;
        gap: 1%;
        row-gap: 10px;

       }
        .box {
            height: 20vh;
            background-color: aqua;
        }

        @media (max-width:1366px) {
            .box {
                width: 24.2%;

            }
        }

        @media (max-width:1080px) {
            .box {
                width: 49.5%;

            }
        }

        @media (max-width:560px) {
            .box {
                width: 100%;
            }
        }
    </style>
</head>

<body>

   <div class="wrapper">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
   </div>

</body>

</html>
