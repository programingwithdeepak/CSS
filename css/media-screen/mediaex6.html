<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;
        }
        .row{
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            row-gap: 10px;
        }
        .col-1,.col-2,.col-3,.col-4,.col-5{
            width: 19.2%;
            height: 25vh;
            background-color: aqua;
        }
        @media(max-width:1080px){
            .col-1,.col-5{
                display: none;
            }
            .col-2{
                width: 100%;
            }
            .col-3,.col-4{
                width: 49.5%;
            }
        }
          
        @media(max-width:560px){
            .col-5,.col-1{
                display: block;
            }
            .col-2,.col-4{
                display: none;
            }
            .col-3,.col-5,.col-1{
                width: 100%;
            }

        }
    </style>
</head>
<body>
    <div class="row">
        <div class="col-1"> <h1>1</h1></div>
        <div class="col-2"> <h1>2</h1></div>
        <div class="col-3"> <h1>3</h1></div>
        <div class="col-4"> <h1>4</h1></div>
        <div class="col-5"> <h1>5</h1></div>
    </div>
</body>
</html>
