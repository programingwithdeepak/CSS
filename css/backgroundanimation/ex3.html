<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Background Animation</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #fff;
        }

        .container {
            width: 600px;
            height: 250px;
            position: relative;
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 8px;
            overflow: hidden;
            background: #0d47a1;
        }

        /* Moving diagonal spotlight overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(120deg, rgba(21, 0, 80, 0.9) 50%, rgba(13, 71, 161, 0.7) 70%);
            animation: sweep 6s linear infinite;
            z-index: 1;
        }

        /* Animated bars (wave motion) */
        .bar {
            width: 20px;
            background: linear-gradient(to top, #e53935, #1e88e5);
            border-radius: 6px;
            animation: wave 2s infinite ease-in-out;
            z-index: 2;
        }

        .bar:nth-child(1) {
            height: 60px;
            animation-delay: 0s;
        }

        .bar:nth-child(2) {
            height: 90px;
            animation-delay: 0.1s;
        }

        .bar:nth-child(3) {
            height: 120px;
            animation-delay: 0.2s;
        }

        .bar:nth-child(4) {
            height: 75px;
            animation-delay: 0.3s;
        }

        .bar:nth-child(5) {
            height: 140px;
            animation-delay: 0.4s;
        }

        .bar:nth-child(6) {
            height: 100px;
            animation-delay: 0.5s;
        }

        .bar:nth-child(7) {
            height: 80px;
            animation-delay: 0.6s;
        }

        .bar:nth-child(8) {
            height: 130px;
            animation-delay: 0.7s;
        }

        .bar:nth-child(9) {
            height: 70px;
            animation-delay: 0.8s;
        }

        .bar:nth-child(10) {
            height: 150px;
            animation-delay: 0.9s;
        }

        /* Wave animation for bars */
        @keyframes wave {

            0%,
            100% {
                transform: scaleY(0.4);
            }

            50% {
                transform: scaleY(1.2);
            }
        }

        /* Diagonal overlay sweeping animation */
        @keyframes sweep {
            0% {
                left: -100%;
            }

            50% {
                left: 0%;
            }

            100% {
                left: -100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="overlay"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
</body>

</html>
