<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0%;
            padding: 0%;
        }
        
         .banner{
            width: 80%;
            height: 50vh;
            border: 2px solid;
            margin: 10vh auto;
            background-image: url(Sound\ Wave.svg);
           
            
        }
        .card{
            width: 50%;
            height: 50vh;
            /* background-color: rgb(247, 246, 243); */
            background-color: whitesmoke;
           clip-path: polygon(0 0, 100% 0, 81% 100%, 0% 100%);
            
        }
        .wavy-circle {
  --s: 200px; 

  width: var(--s); 
  aspect-ratio: 1;
  --g:/calc(var(--s)*0.186) calc(var(--s)*0.186) radial-gradient(50% 50%,#000 99%,#0000 101%) no-repeat;
  mask: calc(50% + var(--s)*0.357) calc(50% + var(--s)*0.124) var(--g),calc(50% + var(--s)*0.193) calc(50% + var(--s)*0.324) var(--g),calc(50% + var(--s)*-0.06) calc(50% + var(--s)*0.373) var(--g),calc(50% + var(--s)*-0.286) calc(50% + var(--s)*0.247) var(--g),calc(50% + var(--s)*-0.378) calc(50% + var(--s)*0.005) var(--g),calc(50% + var(--s)*-0.293) calc(50% + var(--s)*-0.239) var(--g),calc(50% + var(--s)*-0.071) calc(50% + var(--s)*-0.371) var(--g),calc(50% + var(--s)*0.184) calc(50% + var(--s)*-0.33) var(--g),calc(50% + var(--s)*0.353) calc(50% + var(--s)*-0.134) var(--g),radial-gradient(calc(var(--s)*0.427),#000 99%,#0000 101%) subtract,calc(50% + var(--s)*0.379) calc(50% + var(--s)*0.309) var(--g),calc(50% + var(--s)*0.092) calc(50% + var(--s)*0.48) var(--g),calc(50% + var(--s)*-0.238) calc(50% + var(--s)*0.427) var(--g),calc(50% + var(--s)*-0.457) calc(50% + var(--s)*0.174) var(--g),calc(50% + var(--s)*-0.461) calc(50% + var(--s)*-0.161) var(--g),calc(50% + var(--s)*-0.25) calc(50% + var(--s)*-0.42) var(--g),calc(50% + var(--s)*0.078) calc(50% + var(--s)*-0.482) var(--g),calc(50% + var(--s)*0.37) calc(50% + var(--s)*-0.319) var(--g),calc(50% + var(--s)*0.489) calc(50% + var(--s)*-0.007) var(--g);
}



/*  */

.loader {
  --w:10ch;
  font-weight: bold;
  font-family: monospace;
  font-size: 30px;
  letter-spacing: var(--w);
  width:var(--w);
  overflow: hidden;
  white-space: nowrap;
  text-shadow: 
    calc(-1*var(--w)) 0, 
    calc(-2*var(--w)) 0, 
    calc(-3*var(--w)) 0, 
    calc(-4*var(--w)) 0,
    calc(-5*var(--w)) 0, 
    calc(-6*var(--w)) 0, 
    calc(-7*var(--w)) 0, 
    calc(-8*var(--w)) 0, 
    calc(-9*var(--w)) 0;
  animation: l16 2s infinite;
}
.loader:before {
  content:"Loading...";
}
@keyframes l16 {
  20% {text-shadow: 
    calc(-1*var(--w)) 0, 
    calc(-2*var(--w)) 0 red, 
    calc(-3*var(--w)) 0, 
    calc(-4*var(--w)) 0 #ffa516,
    calc(-5*var(--w)) 0 #63fff4, 
    calc(-6*var(--w)) 0, 
    calc(-7*var(--w)) 0, 
    calc(-8*var(--w)) 0 green, 
    calc(-9*var(--w)) 0;}
  40% {text-shadow: 
    calc(-1*var(--w)) 0, 
    calc(-2*var(--w)) 0 red, 
    calc(-3*var(--w)) 0 #e945e9, 
    calc(-4*var(--w)) 0,
    calc(-5*var(--w)) 0 green, 
    calc(-6*var(--w)) 0 orange, 
    calc(-7*var(--w)) 0, 
    calc(-8*var(--w)) 0 green, 
    calc(-9*var(--w)) 0;}
  60% {text-shadow: 
    calc(-1*var(--w)) 0 lightblue, 
    calc(-2*var(--w)) 0, 
    calc(-3*var(--w)) 0 #e945e9, 
    calc(-4*var(--w)) 0,
    calc(-5*var(--w)) 0 green, 
    calc(-6*var(--w)) 0, 
    calc(-7*var(--w)) 0 yellow, 
    calc(-8*var(--w)) 0 #ffa516, 
    calc(-9*var(--w)) 0 red;}
  80% {text-shadow: 
    calc(-1*var(--w)) 0 lightblue, 
    calc(-2*var(--w)) 0 yellow, 
    calc(-3*var(--w)) 0 #63fff4, 
    calc(-4*var(--w)) 0 #ffa516,
    calc(-5*var(--w)) 0 red, 
    calc(-6*var(--w)) 0, 
    calc(-7*var(--w)) 0 grey, 
    calc(-8*var(--w)) 0 #63fff4, 
    calc(-9*var(--w)) 0 ;}
}
    </style>
</head>
<body>
    <div class="banner">
        <div class="card">
             <div class="loader"></div> 
        </div>
        <div class="wavy-circle"></div>
    </div>
</body>
</html>
